    </div>
    <header>
      <nav>
        На головну
      </nav>
    </header>
    <main>
      <article>
        Розпочав багато років назад ...

        .....

        .....
      </article>
      <aside>
        У цьому місці буде реклама
      </aside>
    </main>
    <footer>
      Погреб сайту
    </footer>
    <script src="script.js"></script>
  </body>
</html>
